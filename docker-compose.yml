services:
  postgres:
    image: postgres:15
    container_name: spacedey-postgres
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-spacedey}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - spacedey-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: spacedey-app
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: production
      POSTGRES_HOST: postgres
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-spacedey}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-this}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - spacedey-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  spacedey-network:
    driver: bridge
